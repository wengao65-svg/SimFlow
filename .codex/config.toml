[plugin]
name = "simflow"
version = "0.7.0"

[defaults]
working_directory = "."
sandbox = false
auto_checkpoint = true

[tools]
allow_file_read = true
allow_file_write = true
allow_shell = false
allow_network = false
allow_hpc_submit = false

[workflow]
default_dry_run = true
require_approval_for_submit = true
max_parallel_stages = 1

[logging]
level = "info"
directory = ".simflow/logs/"
